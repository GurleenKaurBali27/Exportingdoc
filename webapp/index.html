<!DOCTYPE html>
<html style="
    background-color: #0d0714;
    background-image:
        radial-gradient(ellipse 80% 60% at 10% 10%,  rgba(120,40,200,0.60)  0%, transparent 60%),
        radial-gradient(ellipse 60% 55% at 88% 8%,   rgba(100,20,180,0.45)  0%, transparent 58%),
        radial-gradient(ellipse 75% 50% at 50% 92%,  rgba(160,20,90,0.40)   0%, transparent 62%),
        radial-gradient(ellipse 50% 45% at 92% 82%,  rgba(80,20,180,0.30)   0%, transparent 55%),
        radial-gradient(ellipse 40% 40% at 3%  88%,  rgba(60,10,120,0.28)   0%, transparent 52%);
    background-attachment: fixed;
    min-height: 100vh;
">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Import &amp; Export</title>

    <!-- Prevent white body flash before SAP CSS loads -->
    <style>
        html, body {
            background-color: #0d0714 !important;
            margin: 0; padding: 0;
        }
        /* Hide scrollbar flicker */
        body { overflow-x: hidden; }
    </style>

    <script id="sap-ui-bootstrap"
        src="https://ui5.sap.com/1.120.0/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_fiori_3"
        data-sap-ui-libs="sap.m,sap.ui.unified,sap.ui.layout,sap.ui.export"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true"
        data-sap-ui-resourceroots='{"exportdoc.exportexcel": "./"}'
        data-sap-ui-oninit="module:sap/ui/core/ComponentSupport">
    </script>
</head>
<body style="background:transparent !important; margin:0; padding:0;">
    <div data-sap-ui-component
         data-name="exportdoc.exportexcel"
         data-id="container"
         data-settings='{"id":"exportdoc.exportexcel"}'>
    </div>
</body>
</html>
